<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Ritimão 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <style>
        :root { --preto: #000; --branco: #fff; --cinza: #aaa; --destaque: #ffd700; --erro: #ff4444; --sucesso: #00bfff; }
        body, html { margin: 0; padding: 0; background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .tela { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; background-size: cover; background-position: center; background-attachment: fixed; }
        #tela-inicial { display: flex; justify-content: center; align-items: center; }
        .logo-btn { width: 90vw; max-width: 450px; border-radius: 100px; border: 8px solid var(--branco); cursor: pointer; transition: 0.4s; box-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .logo-btn:hover { transform: scale(1.02); box-shadow: 0 0 50px var(--destaque); }
        #tela-cadastro { background-image: url('https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Fundo_tela_Cadastro.jpg'); }
        .container { width: 100%; max-width: 480px; background: rgba(0, 0, 0, 0.94); padding: 30px; border-radius: 20px; border: 1px solid #444; margin: 20px 0; }
        .titulo-amarelo { color: var(--destaque); text-align: center; text-transform: uppercase; font-weight: 900; font-size: 1.6rem; margin-bottom: 25px; }
        .grid-vagas { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .vaga-item { border-bottom: 1px solid #333; padding: 6px; font-size: 12px; display: flex; justify-content: space-between; }
        .esgotado { color: var(--erro); font-weight: bold; }
        
        /* Estilo do Alerta de Tamborim */
        .alerta-tamborim { 
            background: rgba(255, 215, 0, 0.1); 
            border: 1px solid var(--destaque); 
            color: #fff; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 11px; 
            margin-bottom: 20px; 
            text-align: center; 
            line-height: 1.4;
        }

        .campo { margin-bottom: 18px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; color: var(--cinza); margin-bottom: 6px; font-weight: 600; }
        input, select { padding: 14px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 1rem; }
        .btn-acao { width: 100%; padding: 20px; background: var(--branco); color: #000; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .btn-acao:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="tela-inicial" class="tela">
        <div style="text-align: center;">
            <img src="https://raw.githubusercontent.com/flavyson-art/escolinha_ritimao/main/Logo.jpg" class="logo-btn" onclick="abrirCadastro()">
            <h1 style="color:var(--destaque); margin-top:40px; font-size: 1.5rem;">TOQUE NO LOGO PARA SE INSCREVER</h1>
        </div>
    </div>

    <div id="tela-cadastro" class="tela">
        <div class="container">
            <h2 class="titulo-amarelo">Inscrições Escolinha 2026</h2>
            <div id="vagas-container" class="grid-vagas"></div>

            <div class="alerta-tamborim">
                <strong>AVISO:</strong> PARA TAMBORIM, É OBRIGATÓRIO TRAZER SEU PRÓPRIO INSTRUMENTO.
            </div>

            <form id="formMatricula">
                <div class="campo"><label>Nome Completo *</label><input type="text" id="nome" required></div>
                <div class="campo"><label>CPF *</label><input type="text" id="cpf" class="mask-cpf" placeholder="000.000.000-00" required></div>
                <div class="campo"><label>Data de Nascimento *</label><input type="text" id="nasc" class="mask-data" placeholder="DD/MM/AAAA" onblur="validarIdade()" required></div>
                
                <div id="campos-responsavel" style="display:none; border-left: 4px solid var(--destaque); padding-left: 15px; background: #111; margin-bottom:15px;">
                    <p style="font-size: 11px; color: var(--destaque); padding-top:10px;">DADOS DO RESPONSÁVEL</p>
                    <div class="campo"><label>Nome do Responsável *</label><input type="text" id="nomeResp"></div>
                    <div class="campo"><label>Telefone do Responsável *</label><input type="text" id="telResp" class="mask-tel"></div>
                </div>

                <div class="campo"><label>Sexo *</label>
                    <select id="sexo" onchange="atualizarInstrumentos()" required>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="campo"><label>WhatsApp *</label><input type="text" id="tel" class="mask-tel" required></div>
                <div class="campo"><label>E-mail *</label><input type="email" id="email" required></div>
                <div class="campo"><label>Rede Social</label><input type="text" id="social"></div>
                <div class="campo"><label>Instrumento *</label><select id="instrumento" onchange="atualizarNiveis()" required></select></div>
                <div class="campo"><label>Nível *</label><select id="nivel" required><option value="">Selecione o instrumento...</option></select></div>

                <div class="campo"><label>Tamanho da Camiseta *</label>
                    <select id="camiseta" required>
                        <option value="">Selecione...</option>
                        <option value="P">P</option><option value="M">M</option><option value="G">G</option><option value="GG">GG</option><option value="XG">XG</option>
                    </select>
                </div>
                
                <div class="campo"><label>Foto de Perfil *</label><input type="file" id="fotoPerfil" accept="image/*" required></div>

                <button type="submit" class="btn-acao" id="btnReservar">Reservar Vaga</button>
            </form>
        </div>
    </div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyIjva-F49DWXpJKvxt2hMVqCZEBKz34dD8DSVc2hedNsAW8Im15vdzWL0Sjjm3tjSv/exec"; 
    let idadeCalculada = null;

    function abrirCadastro() {
        $(".tela").hide();
        $("#tela-cadastro").css("display", "flex");
        carregarVagas();
    }

    async function carregarVagas() {
        try {
            const res = await fetch(URL_API);
            window.vagas = await res.json();
            let html = "";
            const lista = ["Caixa", "Cuica", "Chocalho", "Repique", "Surdo 1", "Surdo 2", "Terceira", "Tamborim", "Timbal", "Xequere"];
            lista.forEach(inst => {
                let qtd = window.vagas[inst] || 0;
                html += `<div class="vaga-item"><span>${inst}</span> <span>${qtd > 0 ? qtd : '<span class="esgotado">Esgotado</span>'}</span></div>`;
            });
            $("#vagas-container").html(html);
            atualizarInstrumentos();
        } catch (e) { console.error("Erro ao carregar vagas:", e); }
    }

    function validarIdade() {
        const dataStr = $("#nasc").val();
        if(dataStr.length < 10) return;
        const partes = dataStr.split("/");
        const nasc = new Date(partes[2], partes[1] - 1, partes[0]);
        const hoje = new Date();
        let idade = hoje.getFullYear() - nasc.getFullYear();
        if (hoje < new Date(hoje.getFullYear(), nasc.getMonth(), nasc.getDate())) idade--;
        idadeCalculada = idade;

        if (idade < 12) {
            alert("Idade mínima: 12 anos.");
            $("#nasc").val("");
            $("#campos-responsavel").hide();
        } else if (idade < 18) {
            $("#campos-responsavel").show();
            $("#nomeResp, #telResp").prop("required", true);
        } else {
            $("#campos-responsavel").hide();
            $("#nomeResp, #telResp").prop("required", false);
        }
    }

    function atualizarInstrumentos() {
        const sexo = $("#sexo").val();
        let html = '<option value="">Selecione...</option>';
        const lista = ["Caixa", "Cuica", "Chocalho", "Repique", "Surdo 1", "Surdo 2", "Terceira", "Tamborim", "Timbal", "Xequere"];
        lista.forEach(i => {
            if (sexo === "Masculino" && (i === "Xequere" || i === "Chocalho")) return;
            let qtd = window.vagas ? (window.vagas[i] || 0) : 0;
            html += `<option value="${i}" ${qtd <= 0 ? 'disabled' : ''}>${i} ${qtd <= 0 ? '(ESGOTADO)' : ''}</option>`;
        });
        $("#instrumento").html(html);
    }

    function atualizarNiveis() {
        const inst = $("#instrumento").val();
        let html = '<option value="">Selecione...</option>';
        if (["Surdo 1", "Surdo 2"].includes(inst)) {
            html += `<option value="Aprimoramento">Curso de aprimoramento</option>`;
        } else {
            html += `<option value="Iniciante">Iniciante</option><option value="Intermediário">Intermediário</option>`;
        }
        $("#nivel").html(html);
    }

    $(document).ready(() => {
        $('.mask-cpf').mask('000.000.000-00');
        $('.mask-data').mask('00/00/0000');
        $('.mask-tel').mask('(00) 00000-0000');
    });

    $("#formMatricula").on("submit", async function(e) {
        e.preventDefault();
        $("#btnReservar").prop("disabled", true).text("Processando...");

        const dados = {
            nome: $("#nome").val(),
            cpf: $("#cpf").val(),
            nasc: $("#nasc").val(),
            sexo: $("#sexo").val(),
            tel: $("#tel").val(),
            email: $("#email").val(),
            social: $("#social").val() || "N/A",
            instrumento: $("#instrumento").val(),
            nivel: $("#nivel").val(),
            camiseta: $("#camiseta").val(),
            nomeResp: $("#nomeResp").val() || "N/A",
            telResp: $("#telResp").val() || "N/A",
            fotoPerfil: await toBase64(document.getElementById("fotoPerfil").files[0])
        };

        try {
            const res = await fetch(URL_API, { method: "POST", body: JSON.stringify(dados) });
            const final = await res.json();
            
            // A mensagem de confirmação agora vem do retorno do servidor
            alert(final.msg);
            
            if (final.status === "sucesso") window.location.reload();
        } catch (e) { alert("Erro na conexão."); }
        $("#btnReservar").prop("disabled", false).text("Reservar Vaga");
    });

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = e => reject(e);
    });
</script>
</body>
</html>
